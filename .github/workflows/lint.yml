name: lint

on:
  pull_request:
    paths:
      - '**/*.py'

jobs:
  mypy:
    name: mypy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run mypy
        run: uv run mypy . --strict
      - name: Run mypy with annotation
        run: |
          uv run mypy . --strict --output=github

  ruff:
    name: ruff
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - name: Set up Python
        run: uv python install 3.12
      - name: Install Ruff
        run: uv tool install ruff
      - name: Run Ruff lint
        run: ruff check . --output-format=github
      - name: Run ruff formatter check
        run: ruff format . --check
